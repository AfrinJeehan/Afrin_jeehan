<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Afrin Jeehan{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}Afrin Jeehan — CS & Business student, AI researcher, developer{% endblock %}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">Afrin Jeehan</a>
      <nav class="nav-desktop">
        <a href="/" class="nav-link">CV</a>
        <a href="/projects" class="nav-link">Projects</a>
        <a href="/writings" class="nav-link">Writings</a>
        <a href="/contact" class="nav-link">Contact</a>
      </nav>
      <button class="mobile-toggle" id="mobile-toggle" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    <nav class="mobile-menu" id="mobile-menu">
      <a href="/" class="mobile-link">CV</a>
      <a href="/projects" class="mobile-link">Projects</a>
      <a href="/writings" class="mobile-link">Writings</a>
      <a href="/contact" class="mobile-link">Contact</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; {{ current_year }} Afrin Jeehan</span>
      <div class="footer-links">
        <a href="https://linkedin.com/in/afrinjeehan" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://github.com/afrinjeehan" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="mailto:afrinjeehan@example.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
