<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Afrin Jeehan — Portfolio{% endblock %}</title>
  <meta name="description" content="Afrin Jeehan — Business Analyst, CS & BBM Undergraduate. Editorial portfolio.">

  <!-- Fonts (loaded via CSS @import as well, this is a backup preconnect) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ url_for('index') }}" class="logo">Afrin Jeehan</a>

      <nav class="nav-desktop" aria-label="Main navigation">
        <a class="nav-link" href="{{ url_for('index') }}">CV</a>
        <a class="nav-link" href="{{ url_for('projects_page') }}">Projects</a>
        <a class="nav-link" href="{{ url_for('writings_page') }}">Writings</a>
        <a class="nav-link" href="{{ url_for('contact') }}">Contact</a>
      </nav>

      <button id="mobile-menu-btn" type="button" class="mobile-toggle" aria-expanded="false" aria-controls="mobile-menu" aria-label="Open menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <nav id="mobile-menu" class="mobile-menu" aria-label="Mobile navigation">
      <a class="mobile-link" href="{{ url_for('index') }}">CV</a>
      <a class="mobile-link" href="{{ url_for('projects_page') }}">Projects</a>
      <a class="mobile-link" href="{{ url_for('writings_page') }}">Writings</a>
      <a class="mobile-link" href="{{ url_for('contact') }}">Contact</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-copy">&copy; {{ current_year }} Afrin Jeehan. All rights reserved.</div>
      <div class="footer-links">
        <a href="https://linkedin.com/in/afrin-jeehan-29b949309" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
        <a href="https://github.com/AfrinJeehan" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="mailto:afrinjeehan.ajmal@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
