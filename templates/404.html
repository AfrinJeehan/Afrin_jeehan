{% extends "layout.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<section class="error-page">
  <div class="container">
    <div class="error-content reveal-scale">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <div class="hero-cta">
        <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
        <a href="{{ url_for('projects_page') }}" class="btn btn-outline"><i class="fas fa-folder-open"></i> View Projects</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
