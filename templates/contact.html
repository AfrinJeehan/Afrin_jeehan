{% extends "layout.html" %}
{% block title %}Contact — Afrin Jeehan{% endblock %}

{% block content %}
<div class="container">
  <div class="page-header">
    <h1 class="page-title reveal">Contact</h1>
    <p class="page-subtitle reveal">Open to opportunities, collaborations &amp; conversations.</p>
  </div>
</div>

<hr class="divider">

<div class="container contact-section">
  <div class="contact-grid stagger">
    <div class="contact-item stagger-item">
      <i class="fas fa-phone"></i>
      <p class="contact-label">Phone</p>
      <p class="contact-value">+94 XX XXX XXXX</p>
    </div>
    <div class="contact-item stagger-item">
      <i class="fas fa-envelope"></i>
      <p class="contact-label">Email</p>
      <p class="contact-value"><a href="mailto:afrinjeehan@example.com">afrinjeehan@example.com</a></p>
    </div>
    <div class="contact-item stagger-item">
      <i class="fas fa-map-marker-alt"></i>
      <p class="contact-label">Location</p>
      <p class="contact-value">Sri Lanka</p>
    </div>
  </div>

  <div class="social-row reveal">
    <a href="https://linkedin.com/in/afrinjeehan" target="_blank" class="social-link"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
    <a href="https://github.com/afrinjeehan" target="_blank" class="social-link"><i class="fab fa-github"></i> GitHub</a>
    <a href="mailto:afrinjeehan@example.com" class="social-link"><i class="fas fa-envelope"></i> Email</a>
  </div>
</div>
{% endblock %}
